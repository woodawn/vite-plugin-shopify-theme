name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 与 publish.yml 一致：用 setup-vp 装 Vite+、Node，并自动 vp install。
      - uses: voidzero-dev/setup-vp@v1

      # tsc / obuild 都在 node_modules/.bin，经 vp 运行器解析（pnpm 布局下 npm 运行器解析不到）。
      - name: Typecheck
        run: vp run typecheck

      - name: Build
        run: vp run build
