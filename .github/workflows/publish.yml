name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # 供 npm provenance 使用

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 按 viteplus.dev/guide/ci 推荐：setup-vp 安装 Vite+、Node，并自动 vp install。
      # registry-url 让它写好发布鉴权用的 .npmrc（配合下方 NODE_AUTH_TOKEN）。
      - uses: voidzero-dev/setup-vp@v1
        with:
          # 省略 node-version → setup-vp 默认使用最新 LTS
          registry-url: https://registry.npmjs.org

      # 用 vp 的运行器构建 dist（本包构建走 obuild；npm 的脚本运行器
      # 在 pnpm 的 node_modules 布局里解析不到 obuild）。
      - run: vp run build

      # 用 pnpm 发布：vp install 会向 package.json 注入 devEngines.packageManager=pnpm
      # 钉死工具链，此后 npm publish 会因 PM 不符报 EBADDEVENGINES，故须用 pnpm。
      # --no-git-checks：release tag 触发时处于 detached HEAD，跳过分支/干净度校验。
      # dist 已由上一步 vp run build 构建，故 --ignore-scripts 跳过生命周期脚本。
      - name: Publish
        run: pnpm publish --no-git-checks --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
