name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # 供 npm provenance 使用

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 按 viteplus.dev/guide/ci 推荐：setup-vp 安装 Vite+、Node，并自动 vp install。
      # registry-url 让它写好发布鉴权用的 .npmrc（配合下方 NODE_AUTH_TOKEN）。
      - uses: voidzero-dev/setup-vp@v1
        with:
          # 省略 node-version → setup-vp 默认使用最新 LTS
          registry-url: https://registry.npmjs.org

      # 用 vp 的运行器构建 dist（本包构建走 obuild；npm 的脚本运行器
      # 在 pnpm 的 node_modules 布局里解析不到 obuild）。
      - run: vp run build

      # vp install 会向 package.json 注入 devEngines.packageManager=pnpm 钉死工具链，
      # 使后续 npm publish 报 EBADDEVENGINES；而 vp 不把 pnpm 暴露到 PATH（无 vp publish）。
      # 故发布前用 node 剥掉这个仅供开发期的字段（不入库，仅改 runner 工作副本），
      # 再用 npm（PATH 上确有）发布。dist 已由 vp run build 构建，--ignore-scripts 跳过生命周期脚本。
      - name: Publish
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.devEngines;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
